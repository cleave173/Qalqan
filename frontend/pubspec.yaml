name: pry_app
description: "PRY – Language Learning Application"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Navigation
  go_router: ^14.8.1

  # Networking
  dio: ^5.7.0
  flutter_secure_storage: ^9.2.4

  # UI
  hugeicons: ^0.0.7
  google_fonts: ^6.2.1

  # Audio
  flutter_tts: ^4.2.0

  cupertino_icons: ^1.0.8
  speech_to_text: ^7.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
